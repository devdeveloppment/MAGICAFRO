{% extends 'base.html' %}

{% block title %}Paiement Annulé | MagicAfro{% endblock %}

{% block content %}
<div class="bg-gray-50 py-24 text-center">
    <div class="container mx-auto px-4 max-w-2xl">
        <div class="bg-white rounded-[60px] shadow-2xl p-12 md:p-20 relative overflow-hidden">
            <div class="w-24 h-24 bg-gray-100 text-gray-400 rounded-full flex items-center justify-center mx-auto mb-8">
                <i class="fa-solid fa-xmark text-4xl"></i>
            </div>
            <h1 class="text-4xl font-extrabold text-primary mb-4">Paiement Annulé</h1>
            <p class="text-gray-500 mb-10">La transaction a été annulée. Aucun montant n'a été débité.</p>
            <a href="{% url 'orders:checkout' %}" class="inline-block border-2 border-primary text-primary px-10 py-4 rounded-2xl font-bold">Réessayer le paiement</a>
        </div>
    </div>
</div>
{% endblock %}
